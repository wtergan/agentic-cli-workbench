"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
# Wider preview pane for coding files; keeps tree + preview readable in tmux.
# Keep Yazi's normal mouse click + scroll behavior for navigation.
# In Ghostty/tmux, use Shift+drag for normal selection or Option+Shift+drag on macOS
# for a rectangular selection that stays within the preview area more cleanly.
ratio = [ 1, 2, 5 ]
scrolloff = 4
mouse_events = [ "click", "scroll" ]
sort_by = "alphabetical"
sort_dir_first = true

[preview]
# Avoid clipped long lines in narrow panes.
wrap = "yes"
tab_size = 2

[opener]
browser = [
  { run = "wslview %s", desc = "browser", for = "linux", orphan = true },
]
edit = [
  { run = "nvim %s",      desc = "nvim",         for = "unix",    block = true },
  { run = "code -w %s",   desc = "code (block)", for = "linux",   block = true },
  { run = "code %s",      desc = "code",         for = "linux",   orphan = true },
  { run = "code %s",      desc = "code",         for = "windows", orphan = true },
  { run = "code -w %s",   desc = "code (block)", for = "windows", block = true },
]

[open]
rules = [
  { url = "*/", use = [ "edit", "open", "reveal" ] },
  { mime = "text/html", use = [ "browser", "reveal" ] },
  { mime = "application/xhtml+xml", use = [ "browser", "reveal" ] },
  { mime = "text/*", use = [ "edit", "reveal" ] },
  { mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
  { mime = "*/javascript", use = [ "edit", "reveal" ] },
  { mime = "inode/empty", use = [ "edit", "reveal" ] },
  { mime = "application/pdf", use = [ "browser", "reveal" ] },
  { url = "*", use = [ "open", "reveal" ] },
]
