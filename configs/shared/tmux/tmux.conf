# =============================================================================
# BASIC SETTINGS
# =============================================================================
set -g mouse on                    # Enable mouse support
set -g history-limit 50000         # Increase scrollback buffer to 50,000 lines
set -g bell-action none            # Disable bell notifications
set -g escape-time 0               # Remove escape key delay
set -g repeat-time 1000            # Set repeat time for key presses

# Agent workflow optimization
set -g focus-events on             # Enable focus events for pane detection
set -g detach-on-destroy off       # Keep session alive when windows close
set -g default-shell /usr/bin/zsh  # New panes/windows start in zsh

# =============================================================================
# TERMINAL AND COLOR SUPPORT
# =============================================================================
set -s set-clipboard external               # Use terminal's OSC 52 for clipboard
set -as terminal-features ',tmux-256color:RGB,hyperlinks'  # Preserve RGB + OSC 8 hyperlinks inside tmux
set -as terminal-features ',wezterm:RGB,hyperlinks'        # Enable WezTerm-specific hyperlink passthrough
set -as terminal-features ',xterm-ghostty:RGB,hyperlinks'  # Enable RGB + hyperlinks for Ghostty
set -as terminal-features ',xterm-256color:RGB,hyperlinks' # Enable RGB + hyperlinks for xterm-256color clients
set -g default-terminal 'tmux-256color'           # Prefer tmux's terminfo
set -sg terminal-overrides ",*:RGB"  # true color support
set -g allow-passthrough on                   # Let terminals like WezTerm receive inline image escapes
set -ga update-environment TERM               # Preserve outer terminal identity for apps inside tmux
set -ga update-environment TERM_PROGRAM       # Preserve WezTerm detection so Yazi can pick the image adapter

# =============================================================================
# STATUS LINE CONFIGURATION (Agent-aware naming and display)
# =============================================================================
set -g status on                                  # Enable status bar
set -g status-interval 1                          # Update status every 1 second
set -g status-style bg=#5f5f5f,fg=#e6e6e6         # Status bar: fixed gray background for cross-mode consistency
set -g status-left "#[fg=#f2c94c,bold]#{session_name}#[fg=#cfcfcf] #{?window_zoomed_flag,🔍 ,}"
set -g status-right "#[fg=#e6e6e6,bold]#{pane_current_path}:#{pane_current_command} #[fg=#f2c94c,bold]%H:%M"
set -g status-left-length 50
set -g status-right-length 80
set -g status-justify centre
set -g status-position bottom

# Agent-specific window status formatting (fixed gray/yellow bar across dark and light modes)
set -g window-status-format "#[fg=#d8d8d8]#{window_index}:#{window_name} "
set -g window-status-current-format "#[fg=#f2c94c,bold,underscore]#{window_index}:#{window_name} "
set -g window-status-current-style "fg=#f2c94c,bold"
set -g window-status-activity-style "fg=#f2c94c"
set -g window-status-bell-style "fg=#ff7a7a,bold"

# =============================================================================
# WINDOW AND PANE MANAGEMENT (Agent workflow optimization)
# =============================================================================
set -g renumber-windows on                          # Auto-renumber windows
set -g base-index 1                                 # Start window numbering at 1
set -g pane-base-index 1                            # Start pane numbering at 1
set -g pane-border-lines heavy                      # Heavy border for thin line effect
set -g pane-border-style fg=#d4c4e0,bg=default      # Inactive pane border (light purple, subtle)
set -g pane-active-border-style fg=#5c3d7a,bg=default # Active pane: dark purple for light wallpaper contrast
set-option -g allow-rename on                       # Enable manual window renaming for agent types
set-option -g pane-border-indicators off            # Disable redundant indicators
set-option -g pane-border-status off

# =============================================================================
# COPY MODE SETTINGS
# =============================================================================
setw -g mode-keys vi                                 # Vi-style keys in copy mode
bind -T copy-mode-vi v send -X begin-selection       # 'v' to start selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel  # 'y' to copy and exit

# =============================================================================
# GENERAL KEYBINDINGS (Agent workflow optimized)
# =============================================================================
bind c new-window -c "#{pane_current_path}"        # New window in current path
bind C command-prompt -p "Window name:" "new-window -n '%1' -c '#{pane_current_path}'" # Named window creation
bind | split-window -h -c "#{pane_current_path}"   # Horizontal split (agent pane)
bind - split-window -v -c "#{pane_current_path}"   # Vertical split (agent pane)
unbind '"'                                         # Remove default vertical split
unbind '%'                                         # Remove default horizontal split
bind f resize-pane -Z                              # Toggle pane zoom (focus mode)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"  # Reload config with confirmation
bind , command-prompt -p "Rename window:" "rename-window '%1'"   # Rename window (for agent types)

# Pane switching without prefix (seamless navigation)
bind -n M-Left select-pane -L                      # Alt+Left
bind -n M-Right select-pane -R                     # Alt+Right
bind -n M-Up select-pane -U                        # Alt+Up
bind -n M-Down select-pane -D                      # Alt+Down

# Quick pane cycling
bind -n M-n select-pane -t :+                        # Alt+n - next pane
bind -n M-p select-pane -t :-                        # Alt+p - previous pane

# =============================================================================
# POPUP WINDOW BINDINGS (Simplified Generic Agent Workflow)
# =============================================================================
# Primary: Popup for focused work on current pane
bind p display-popup -E -w 85% -h 85% -x C -y C "clear; bash -i"

# Popup with file explorer/fzf for quick navigation
bind F display-popup -E -w 75% -h 75% -x C -y C \
  "cd '#{pane_current_path}' && (which fzf &> /dev/null && fzf || ls -la) || $SHELL"

# Popup file picker: fzf + preview + open in $EDITOR
bind s display-popup -E -w 90% -h 90% -x C -y C -d '#{pane_current_path}' \
  "tmux-fzf-file '#{pane_current_path}' || { code=\$?; echo \"tmux-fzf-file failed (exit \$code)\"; echo; read; }"

# Popup content search: ripgrep + fzf + jump to line
bind g display-popup -E -w 90% -h 90% -x C -y C -d '#{pane_current_path}' \
  "tmux-fzf-rg '#{pane_current_path}' || { code=\$?; echo \"tmux-fzf-rg failed (exit \$code)\"; echo; read; }"

# Popup for quick scratch/test session
bind T display-popup -E -d '#{pane_current_path}' -w 80% -h 80% -x C -y C \
  "tmux attach -t scratch 2>/dev/null || tmux new-session -d -s scratch -c '#{pane_current_path}' && tmux attach -t scratch"

# Popup to view session overview
bind M display-popup -E -w 100% -h 100% -x 0 -y 0 \
  "tmux list-windows -t '#{session_name}' && echo '---' && tmux list-panes -t '#{session_name}' && read"

# =============================================================================
# AGENT INITIALIZATION & SESSION MANAGEMENT (Simplified)
# =============================================================================
# Helper command to spawn a new generic window
bind A new-window -c "#{pane_current_path}"

# Master helper to initialize/attach the default IDE session
bind O run-shell "ide '#{session_name}' '#{pane_current_path}'"


# =============================================================================
# PREFIX SETTINGS
# =============================================================================
unbind C-b                                         # Remove default prefix
set -g prefix `                                    # Set prefix to backtick
bind ` send-prefix                                 # Send literal backtick

# =============================================================================
# PLUGIN DECLARATIONS
# =============================================================================
# tmux Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'

# Session persistence and recovery
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-reload of config when modified
set -g @plugin 'b0o/tmux-autoreload'

# Rich status bar
set -g @plugin '2kabhishek/tmux2k'

# Keep continuum last so its autosave hook survives status-right rewrites
set -g @plugin 'tmux-plugins/tmux-continuum'

# =============================================================================
# PLUGIN CONFIGURATION
# =============================================================================
# Continuum settings (save automatically; auto-restore when a fresh tmux server starts)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'

# tmux2k settings
set -g @tmux2k-theme 'default no powerline'
set -g @tmux2k-show-powerline false
set -g @tmux2k-refresh-rate 5
set -g @tmux2k-left-plugins "session cwd"
set -g @tmux2k-right-plugins "cpu ram battery time"
set -g @tmux2k-session-icon ""
set -g @tmux2k-cpu-icon "💻"
set -g @tmux2k-ram-icon "🧠"
set -g @tmux2k-network-wifi-icon "🛜"
set -g @tmux2k-network-ethernet-icon "🛜"
set -g @tmux2k-bg-main '#5f5f5f'
set -g @tmux2k-bg-alt '#737373'
set -g @tmux2k-text '#f4f4f4'
set -g @tmux2k-prefix-highlight '#f2c94c'
set -g @tmux2k-session-colors "light_yellow black"
set -g @tmux2k-cwd-colors "light_yellow black"
set -g @tmux2k-cpu-colors "light_yellow black"
set -g @tmux2k-ram-colors "yellow black"
set -g @tmux2k-battery-colors "orange black"
set -g @tmux2k-time-colors "light_yellow black"

# Apply dynamic tmux colors generated by `weztheme` when present before TPM runs,
# so tmux2k can still own the final status line while inheriting pane colors.
if-shell '[ -f ~/.config/tmux/theme.conf ]' "source-file ~/.config/tmux/theme.conf"

# Initialize tmux plugin manager only if installed
if-shell '[ -x ~/.config/tmux/plugins/tpm/tpm ]' "run '~/.config/tmux/plugins/tpm/tpm'"



# Bootstrap/install TPM plugins from inside tmux.
bind I run-shell "if [ ! -x ~/.config/tmux/plugins/tpm/tpm ]; then mkdir -p ~/.config/tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm; fi; ~/.config/tmux/plugins/tpm/bin/install_plugins"
